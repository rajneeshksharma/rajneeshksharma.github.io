<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="clb">
  <title id="clb">The Canadian Load Board — B2B logistics platform for brokers and carriers</title>
  <defs>
    <linearGradient id="clbBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#140524"/>
      <stop offset=".55" stop-color="#6d28d9"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="clbCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="1" stop-color="#f5f3ff" stop-opacity=".95"/>
    </linearGradient>
    <radialGradient id="clbGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#a855f7" stop-opacity=".55"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="clbShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope=".4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#clbBg)"/>
  <circle cx="950" cy="180" r="300" fill="url(#clbGlow)"/>
  <circle cx="200" cy="560" r="220" fill="url(#clbGlow)" opacity=".7"/>

  <!-- Canada-ish map silhouette (left) -->
  <g transform="translate(110 170)" filter="url(#clbShadow)">
    <rect width="500" height="420" rx="18" fill="#ffffff" fill-opacity=".97"/>
    <text x="24" y="40" fill="#140524" font-family="system-ui,sans-serif" font-size="12" font-weight="700" letter-spacing="2">ACTIVE LANES</text>

    <!-- Simplified Canada map -->
    <g transform="translate(24 60)" fill="#ede9fe" stroke="#a855f7" stroke-width="1.5" stroke-linejoin="round">
      <path d="M10 60 L40 40 L90 50 L140 30 L200 40 L260 20 L320 30 L380 50 L440 70 L450 120 L430 160 L400 200 L340 220 L280 210 L220 230 L160 220 L110 240 L60 220 L30 180 L10 140 Z"/>
    </g>

    <!-- Route pins -->
    <g>
      <circle cx="120" cy="170" r="10" fill="#a855f7"/>
      <circle cx="120" cy="170" r="10" fill="none" stroke="#a855f7" stroke-width="2" opacity=".5">
        <animate attributeName="r" values="10;20;10" dur="1.8s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".5;0;.5" dur="1.8s" repeatCount="indefinite"/>
      </circle>
      <text x="120" y="198" text-anchor="middle" fill="#6d28d9" font-family="system-ui,sans-serif" font-size="10" font-weight="700">VAN</text>

      <circle cx="280" cy="190" r="10" fill="#a855f7"/>
      <text x="280" y="218" text-anchor="middle" fill="#6d28d9" font-family="system-ui,sans-serif" font-size="10" font-weight="700">WPG</text>

      <circle cx="380" cy="200" r="12" fill="#6d28d9"/>
      <text x="380" y="230" text-anchor="middle" fill="#6d28d9" font-family="system-ui,sans-serif" font-size="10" font-weight="700">TOR</text>

      <circle cx="440" cy="180" r="10" fill="#a855f7"/>
      <text x="440" y="208" text-anchor="middle" fill="#6d28d9" font-family="system-ui,sans-serif" font-size="10" font-weight="700">MTL</text>
    </g>

    <!-- Route lines -->
    <g stroke="#6d28d9" stroke-width="2.5" stroke-dasharray="6 5" fill="none" stroke-linecap="round">
      <path d="M120 170 Q200 140 280 190"/>
      <path d="M280 190 Q330 170 380 200"/>
      <path d="M380 200 Q410 170 440 180"/>
    </g>

    <!-- Stats strip -->
    <g transform="translate(24 320)">
      <rect width="452" height="80" rx="12" fill="#140524"/>
      <g font-family="system-ui,sans-serif" fill="#fff">
        <g>
          <text x="30" y="30" fill="#c4b5fd" font-size="10" font-weight="700">OPEN LOADS</text>
          <text x="30" y="60" font-size="26" font-weight="800">1,247</text>
        </g>
        <g transform="translate(160 0)">
          <text x="0" y="30" fill="#c4b5fd" font-size="10" font-weight="700">CARRIERS</text>
          <text x="0" y="60" font-size="26" font-weight="800">380+</text>
        </g>
        <g transform="translate(290 0)">
          <text x="0" y="30" fill="#c4b5fd" font-size="10" font-weight="700">RFQ AUTO</text>
          <text x="0" y="60" font-size="26" font-weight="800">24/7</text>
        </g>
      </g>
    </g>
  </g>

  <!-- Load card stack (right) -->
  <g transform="translate(700 180)">
    <g filter="url(#clbShadow)" transform="translate(30 30) rotate(4)">
      <rect width="360" height="120" rx="14" fill="url(#clbCard)" opacity=".8"/>
    </g>
    <g filter="url(#clbShadow)" transform="translate(15 15) rotate(2)">
      <rect width="360" height="120" rx="14" fill="url(#clbCard)" opacity=".9"/>
    </g>
    <!-- top card -->
    <g filter="url(#clbShadow)">
      <rect width="360" height="120" rx="14" fill="url(#clbCard)"/>
      <g transform="translate(20 20)">
        <rect width="70" height="22" rx="11" fill="#a855f7"/>
        <text x="35" y="16" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="10" font-weight="800">LOAD #4129</text>
      </g>
      <text x="20" y="68" fill="#140524" font-family="system-ui,sans-serif" font-size="16" font-weight="800">Toronto → Vancouver</text>
      <text x="20" y="88" fill="#6d28d9" font-family="system-ui,sans-serif" font-size="12" font-weight="600">53' Dry Van · 34,000 lbs</text>
      <g transform="translate(260 60)">
        <text x="0" y="0" fill="#140524" font-family="system-ui,sans-serif" font-size="22" font-weight="800" text-anchor="end">$4,200</text>
        <text x="0" y="18" fill="#10b981" font-family="system-ui,sans-serif" font-size="11" font-weight="700" text-anchor="end">Stripe ready ✓</text>
      </g>
      <!-- Bid button -->
      <g transform="translate(20 100)">
        <rect width="320" height="28" rx="14" fill="#6d28d9"/>
        <text x="160" y="19" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="12" font-weight="800">SUBMIT BID · RFQ AUTO</text>
      </g>
    </g>

    <!-- Broker ↔ Carrier badge -->
    <g transform="translate(70 200)" filter="url(#clbShadow)">
      <rect width="280" height="64" rx="16" fill="#140524"/>
      <text x="20" y="26" fill="#c4b5fd" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="2">B2B PLATFORM</text>
      <text x="20" y="52" fill="#fff" font-family="system-ui,sans-serif" font-size="16" font-weight="800">Broker ↔ Carrier</text>
      <g transform="translate(200 20)">
        <circle cx="12" cy="12" r="12" fill="#a855f7"/>
        <circle cx="36" cy="12" r="12" fill="#10b981"/>
        <circle cx="60" cy="12" r="12" fill="#f59e0b"/>
      </g>
    </g>
  </g>

  <!-- Title lockup -->
  <g transform="translate(80 60)">
    <text fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" letter-spacing="-1">Canadian Load Board</text>
    <text y="28" fill="#d8b4fe" font-family="system-ui,sans-serif" font-size="15" font-weight="500">B2B logistics · Brokers · Carriers · Stripe RFQ</text>
  </g>
</svg>
