<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="dt">
  <title id="dt">Date.Com — social dating app with real-time chat and smart matching</title>
  <defs>
    <linearGradient id="dBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0b2e"/>
      <stop offset=".55" stop-color="#6b1a5c"/>
      <stop offset="1" stop-color="#ff3b7a"/>
    </linearGradient>
    <linearGradient id="dCard" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="1" stop-color="#ffeaf2" stop-opacity=".96"/>
    </linearGradient>
    <linearGradient id="dHeart" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff3b7a"/>
      <stop offset="1" stop-color="#ff8fa3"/>
    </linearGradient>
    <radialGradient id="dGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#ff3b7a" stop-opacity=".55"/>
      <stop offset="1" stop-color="#ff3b7a" stop-opacity="0"/>
    </radialGradient>
    <filter id="dShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope=".35"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#dBg)"/>
  <circle cx="950" cy="140" r="280" fill="url(#dGlow)"/>
  <circle cx="220" cy="560" r="220" fill="url(#dGlow)" opacity=".7"/>

  <!-- dotted grid -->
  <g fill="#ffffff" opacity=".08">
    <circle cx="80" cy="80" r="2"/><circle cx="160" cy="80" r="2"/><circle cx="240" cy="80" r="2"/>
    <circle cx="80" cy="160" r="2"/><circle cx="160" cy="160" r="2"/><circle cx="240" cy="160" r="2"/>
    <circle cx="1120" cy="595" r="2"/><circle cx="1040" cy="595" r="2"/><circle cx="960" cy="595" r="2"/>
    <circle cx="1120" cy="515" r="2"/><circle cx="1040" cy="515" r="2"/><circle cx="960" cy="515" r="2"/>
  </g>

  <!-- Back profile card -->
  <g transform="translate(260 140) rotate(-8)" filter="url(#dShadow)">
    <rect width="320" height="420" rx="28" fill="url(#dCard)"/>
    <circle cx="160" cy="150" r="68" fill="#ffd4e0"/>
    <circle cx="160" cy="130" r="28" fill="#a85a7a"/>
    <path d="M100 200 Q160 170 220 200 L220 230 Q160 210 100 230 Z" fill="#a85a7a"/>
    <rect x="60" y="260" width="200" height="14" rx="7" fill="#e6c8d6"/>
    <rect x="60" y="290" width="140" height="10" rx="5" fill="#f0d4e0"/>
    <rect x="60" y="340" width="80" height="28" rx="14" fill="#ff3b7a"/>
    <rect x="150" y="340" width="110" height="28" rx="14" fill="#ffeaf2"/>
  </g>

  <!-- Front profile card -->
  <g transform="translate(540 180) rotate(6)" filter="url(#dShadow)">
    <rect width="340" height="440" rx="32" fill="url(#dCard)"/>
    <circle cx="170" cy="160" r="76" fill="#ffb7c9"/>
    <circle cx="170" cy="138" r="32" fill="#3d1528"/>
    <path d="M100 220 Q170 185 240 220 L240 252 Q170 232 100 252 Z" fill="#3d1528"/>
    <rect x="70" y="288" width="200" height="16" rx="8" fill="#2a0f1e"/>
    <rect x="70" y="318" width="150" height="12" rx="6" fill="#6b1a5c" opacity=".6"/>
    <g transform="translate(70 360)">
      <rect width="86" height="32" rx="16" fill="#ff3b7a"/>
      <text x="43" y="22" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">MATCH</text>
    </g>
    <g transform="translate(166 360)">
      <rect width="102" height="32" rx="16" fill="none" stroke="#ff3b7a" stroke-width="2"/>
      <text x="51" y="22" text-anchor="middle" fill="#ff3b7a" font-family="system-ui,sans-serif" font-size="13" font-weight="700">MESSAGE</text>
    </g>
  </g>

  <!-- Giant heart badge -->
  <g transform="translate(870 260)" filter="url(#dShadow)">
    <circle r="92" fill="#fff"/>
    <path d="M0 -28 C -18 -60 -62 -58 -62 -18 C -62 14 -30 40 0 60 C 30 40 62 14 62 -18 C 62 -58 18 -60 0 -28 Z" fill="url(#dHeart)"/>
  </g>

  <!-- Chat bubbles -->
  <g transform="translate(910 430)" filter="url(#dShadow)">
    <rect width="200" height="50" rx="25" fill="#fff"/>
    <circle cx="28" cy="25" r="5" fill="#ff3b7a"/>
    <circle cx="48" cy="25" r="5" fill="#ff3b7a" opacity=".6"/>
    <circle cx="68" cy="25" r="5" fill="#ff3b7a" opacity=".3"/>
    <text x="120" y="31" fill="#6b1a5c" font-family="system-ui,sans-serif" font-size="14" font-weight="600">typing…</text>
  </g>

  <!-- Backend badge (top-right) -->
  <g transform="translate(920 40)" filter="url(#dShadow)">
    <rect width="220" height="72" rx="14" fill="#1a0b2e" stroke="#ff3b7a" stroke-width="1.5"/>
    <text x="16" y="24" fill="#ff8fa3" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="2">BACKEND</text>
    <g transform="translate(16 34)" font-family="system-ui,sans-serif" font-size="11" font-weight="700">
      <rect width="56" height="22" rx="11" fill="#10b981"/>
      <text x="28" y="15" text-anchor="middle" fill="#fff">Node.js</text>
      <rect x="62" width="44" height="22" rx="11" fill="#f59e0b"/>
      <text x="84" y="15" text-anchor="middle" fill="#fff">AWS</text>
      <rect x="112" width="72" height="22" rx="11" fill="#065f46"/>
      <text x="148" y="15" text-anchor="middle" fill="#fff">MongoDB</text>
    </g>
  </g>

  <!-- Title lockup -->
  <g transform="translate(80 540)">
    <text fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="52" font-weight="800" letter-spacing="-1">Date.Com</text>
    <text y="36" fill="#ffb7c9" font-family="system-ui,sans-serif" font-size="18" font-weight="500">Node.js · AWS · MongoDB · Sendbird · Branch.io</text>
  </g>
</svg>
