<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="fx">
  <title id="fx">Fluxiontek RAG Chatbot — enterprise RAG over 10K+ internal documents</title>
  <defs>
    <linearGradient id="fxBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a0b2e"/>
      <stop offset=".55" stop-color="#5b21b6"/>
      <stop offset="1" stop-color="#a855f7"/>
    </linearGradient>
    <linearGradient id="fxDoc" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="1" stop-color="#f3e8ff" stop-opacity=".95"/>
    </linearGradient>
    <radialGradient id="fxGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#a855f7" stop-opacity=".55"/>
      <stop offset="1" stop-color="#a855f7" stop-opacity="0"/>
    </radialGradient>
    <filter id="fxShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10"/>
      <feOffset dy="8"/>
      <feComponentTransfer><feFuncA type="linear" slope=".4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#fxBg)"/>
  <circle cx="950" cy="160" r="300" fill="url(#fxGlow)"/>
  <circle cx="220" cy="560" r="220" fill="url(#fxGlow)" opacity=".7"/>

  <!-- Document stack (left) -->
  <g transform="translate(140 200)" filter="url(#fxShadow)">
    <rect x="40" y="40" width="220" height="280" rx="12" fill="url(#fxDoc)" opacity=".7" transform="rotate(-8 150 180)"/>
    <rect x="20" y="20" width="220" height="280" rx="12" fill="url(#fxDoc)" opacity=".85" transform="rotate(-3 130 160)"/>
    <rect width="220" height="280" rx="12" fill="url(#fxDoc)"/>
    <g fill="#5b21b6" opacity=".85">
      <rect x="24" y="28" width="110" height="14" rx="3"/>
      <rect x="24" y="56" width="172" height="8" rx="2" opacity=".5"/>
      <rect x="24" y="72" width="160" height="8" rx="2" opacity=".5"/>
      <rect x="24" y="88" width="140" height="8" rx="2" opacity=".5"/>
      <rect x="24" y="116" width="172" height="8" rx="2" opacity=".5"/>
      <rect x="24" y="132" width="150" height="8" rx="2" opacity=".5"/>
      <rect x="24" y="160" width="120" height="8" rx="2" opacity=".7" fill="#a855f7"/>
      <rect x="24" y="180" width="172" height="8" rx="2" opacity=".5"/>
      <rect x="24" y="196" width="160" height="8" rx="2" opacity=".5"/>
      <rect x="24" y="224" width="172" height="8" rx="2" opacity=".5"/>
      <rect x="24" y="240" width="140" height="8" rx="2" opacity=".5"/>
    </g>
    <!-- count badge -->
    <g transform="translate(150 250)">
      <rect width="90" height="32" rx="16" fill="#5b21b6"/>
      <text x="45" y="21" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="800">10,000+</text>
    </g>
  </g>

  <!-- AI brain node (center) -->
  <g transform="translate(560 310)">
    <circle r="72" fill="#a855f7" opacity=".15"/>
    <circle r="72" fill="none" stroke="#a855f7" stroke-width="2" opacity=".5">
      <animate attributeName="r" values="72;96;72" dur="2.4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".5;0;.5" dur="2.4s" repeatCount="indefinite"/>
    </circle>
    <circle r="56" fill="#a855f7" filter="url(#fxShadow)"/>
    <g stroke="#fff" stroke-width="3" fill="none" stroke-linecap="round">
      <circle cx="0" cy="0" r="22" opacity=".9"/>
      <path d="M-22 0 h-8 M22 0 h8 M0 -22 v-8 M0 22 v8 M-16 -16 l-6 -6 M16 -16 l6 -6 M-16 16 l-6 6 M16 16 l6 6" opacity=".9"/>
      <circle cx="0" cy="0" r="6" fill="#fff"/>
    </g>
    <!-- Connection lines to docs & chat -->
    <g stroke="#a855f7" stroke-width="2" opacity=".6" stroke-dasharray="4 4" fill="none">
      <path d="M-56 0 L-160 -80"/>
      <path d="M-56 20 L-160 80"/>
      <path d="M56 -10 L180 -80"/>
      <path d="M56 20 L180 80"/>
    </g>
  </g>

  <!-- Chat panel (right) -->
  <g transform="translate(780 170)" filter="url(#fxShadow)">
    <rect width="340" height="340" rx="16" fill="#ffffff" fill-opacity=".97"/>
    <!-- header -->
    <rect width="340" height="44" rx="16" fill="#5b21b6"/>
    <rect y="30" width="340" height="14" fill="#5b21b6"/>
    <circle cx="26" cy="22" r="8" fill="#a855f7"/>
    <text x="44" y="28" fill="#fff" font-family="system-ui,sans-serif" font-size="13" font-weight="700">Ask your docs</text>
    <!-- user question -->
    <g transform="translate(60 70)">
      <rect width="260" height="48" rx="12" fill="#f3e8ff"/>
      <text x="16" y="22" fill="#5b21b6" font-family="system-ui,sans-serif" font-size="10" font-weight="700">YOU</text>
      <text x="16" y="40" fill="#1a0b2e" font-family="system-ui,sans-serif" font-size="12">"What's our Q4 refund policy?"</text>
    </g>
    <!-- ai answer -->
    <g transform="translate(20 140)">
      <rect width="300" height="100" rx="12" fill="#a855f7"/>
      <text x="16" y="24" fill="#f3e8ff" font-family="system-ui,sans-serif" font-size="10" font-weight="700">ANSWER</text>
      <text x="16" y="44" fill="#fff" font-family="system-ui,sans-serif" font-size="11">Refunds allowed within 30 days of</text>
      <text x="16" y="60" fill="#fff" font-family="system-ui,sans-serif" font-size="11">invoice per Finance Policy v4.2.</text>
      <g transform="translate(16 72)">
        <rect width="90" height="20" rx="10" fill="#fff" fill-opacity=".2"/>
        <text x="45" y="14" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="9" font-weight="700">policy.pdf ↗</text>
        <rect x="98" width="90" height="20" rx="10" fill="#fff" fill-opacity=".2"/>
        <text x="143" y="14" text-anchor="middle" fill="#fff" font-family="system-ui,sans-serif" font-size="9" font-weight="700">q4-memo.md ↗</text>
      </g>
    </g>
    <!-- latency -->
    <g transform="translate(20 262)">
      <rect width="300" height="48" rx="10" fill="#1a0b2e"/>
      <text x="150" y="30" text-anchor="middle" fill="#a855f7" font-family="system-ui,sans-serif" font-size="13" font-weight="700">&lt;400ms p95 · cited answers</text>
    </g>
  </g>

  <!-- Title lockup -->
  <g transform="translate(80 70)">
    <text fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" letter-spacing="-1">Fluxiontek RAG</text>
    <text y="28" fill="#d8b4fe" font-family="system-ui,sans-serif" font-size="15" font-weight="500">Enterprise chatbot · LangChain · Pinecone · OpenAI</text>
  </g>
</svg>
