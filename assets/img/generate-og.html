<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>OG Image Generator</title>
  <style>
    body { margin: 0; padding: 20px; background: #333; font-family: system-ui; }
    canvas { display: block; margin: 0 auto; border: 1px solid #555; }
    .actions { text-align: center; margin-top: 16px; }
    .actions a { color: #10b981; font-size: 18px; }
  </style>
</head>
<body>
  <canvas id="og" width="1200" height="630"></canvas>
  <div class="actions">
    <a id="download" href="#" download="og-preview.png">Download og-preview.png</a>
  </div>
  <script>
    const canvas = document.getElementById('og');
    const ctx = canvas.getContext('2d');
    const W = 1200, H = 630;

    // Background
    ctx.fillStyle = '#0c0c0c';
    ctx.fillRect(0, 0, W, H);

    // Gradient accent bar (top)
    const barGrad = ctx.createLinearGradient(0, 0, W, 0);
    barGrad.addColorStop(0, '#10b981');
    barGrad.addColorStop(0.5, '#3b82f6');
    barGrad.addColorStop(1, '#a855f7');
    ctx.fillStyle = barGrad;
    ctx.fillRect(0, 0, W, 5);

    // Subtle grid pattern
    ctx.strokeStyle = 'rgba(255,255,255,0.03)';
    ctx.lineWidth = 1;
    for (let x = 0; x < W; x += 60) {
      ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke();
    }
    for (let y = 0; y < H; y += 60) {
      ctx.beginPath(); ctx.moveTo(0, y); ctx.lineTo(W, y); ctx.stroke();
    }

    // Glow circle (decorative)
    const glowGrad = ctx.createRadialGradient(900, 300, 0, 900, 300, 350);
    glowGrad.addColorStop(0, 'rgba(16, 185, 129, 0.08)');
    glowGrad.addColorStop(1, 'rgba(16, 185, 129, 0)');
    ctx.fillStyle = glowGrad;
    ctx.fillRect(0, 0, W, H);

    // "R.S" logo
    ctx.font = 'bold 28px system-ui, sans-serif';
    ctx.fillStyle = '#f1f5f9';
    ctx.fillText('R', 60, 70);
    ctx.fillStyle = '#10b981';
    ctx.fillText('.', 60 + ctx.measureText('R').width, 70);
    ctx.fillStyle = '#f1f5f9';
    ctx.fillText('S', 60 + ctx.measureText('R.').width, 70);

    // Available badge
    ctx.fillStyle = 'rgba(16, 185, 129, 0.12)';
    roundRect(ctx, 60, 130, 240, 36, 18);
    ctx.fill();
    ctx.strokeStyle = 'rgba(16, 185, 129, 0.4)';
    ctx.lineWidth = 1;
    roundRect(ctx, 60, 130, 240, 36, 18);
    ctx.stroke();
    ctx.fillStyle = '#10b981';
    ctx.beginPath();
    ctx.arc(80, 148, 5, 0, Math.PI * 2);
    ctx.fill();
    ctx.font = '500 14px system-ui, sans-serif';
    ctx.fillStyle = '#10b981';
    ctx.fillText('Available for Freelance', 94, 153);

    // Name
    ctx.font = 'bold 56px system-ui, sans-serif';
    ctx.fillStyle = '#f1f5f9';
    ctx.fillText('Rajneesh Sharma', 60, 240);

    // Title with gradient
    ctx.font = 'bold 32px system-ui, sans-serif';
    const titleGrad = ctx.createLinearGradient(60, 0, 500, 0);
    titleGrad.addColorStop(0, '#10b981');
    titleGrad.addColorStop(1, '#3b82f6');
    ctx.fillStyle = titleGrad;
    ctx.fillText('Senior Full Stack Developer & AI Developer', 60, 290);

    // Description
    ctx.font = '18px system-ui, sans-serif';
    ctx.fillStyle = '#94a3b8';
    ctx.fillText('8+ years building AI-powered web applications with React, Node.js, and modern JavaScript.', 60, 340);
    ctx.fillText('Specializing in RAG systems, AI automation, and high-performance architecture.', 60, 368);

    // Tech tags
    const tags = ['React', 'Node.js', 'TypeScript', 'Next.js', 'AWS', 'AI / RAG', 'Claude Code'];
    let tagX = 60;
    const tagY = 420;
    ctx.font = '500 14px system-ui, sans-serif';
    tags.forEach(tag => {
      const tw = ctx.measureText(tag).width + 24;
      ctx.fillStyle = 'rgba(241, 245, 249, 0.06)';
      roundRect(ctx, tagX, tagY, tw, 32, 6);
      ctx.fill();
      ctx.strokeStyle = 'rgba(241, 245, 249, 0.12)';
      ctx.lineWidth = 1;
      roundRect(ctx, tagX, tagY, tw, 32, 6);
      ctx.stroke();
      ctx.fillStyle = '#94a3b8';
      ctx.fillText(tag, tagX + 12, tagY + 21);
      tagX += tw + 10;
    });

    // Stats
    const stats = [
      { num: '20+', label: 'Projects' },
      { num: '8+', label: 'Years' },
      { num: 'AI', label: 'Powered' }
    ];
    let statX = 60;
    stats.forEach(s => {
      ctx.font = 'bold 36px system-ui, sans-serif';
      ctx.fillStyle = '#10b981';
      ctx.fillText(s.num, statX, 540);
      ctx.font = '14px system-ui, sans-serif';
      ctx.fillStyle = '#475569';
      ctx.fillText(s.label, statX, 562);
      statX += 160;
    });

    // URL
    ctx.font = '500 16px monospace';
    ctx.fillStyle = '#475569';
    ctx.fillText('rajneeshksharma.github.io', 60, 605);

    // Gradient accent bar (bottom)
    ctx.fillStyle = barGrad;
    ctx.fillRect(0, H - 4, W, 4);

    // Download link
    document.getElementById('download').href = canvas.toDataURL('image/png');

    function roundRect(ctx, x, y, w, h, r) {
      ctx.beginPath();
      ctx.moveTo(x + r, y);
      ctx.lineTo(x + w - r, y);
      ctx.quadraticCurveTo(x + w, y, x + w, y + r);
      ctx.lineTo(x + w, y + h - r);
      ctx.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
      ctx.lineTo(x + r, y + h);
      ctx.quadraticCurveTo(x, y + h, x, y + h - r);
      ctx.lineTo(x, y + r);
      ctx.quadraticCurveTo(x, y, x + r, y);
      ctx.closePath();
    }
  </script>
</body>
</html>
