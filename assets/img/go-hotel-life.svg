<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="ghl">
  <title id="ghl">Go Hotel Life — BLE-based room access, check-in, and POS integration</title>
  <defs>
    <linearGradient id="hBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1d2e"/>
      <stop offset=".5" stop-color="#124a6b"/>
      <stop offset="1" stop-color="#f5a524"/>
    </linearGradient>
    <linearGradient id="hBuilding" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#fff7e6"/>
      <stop offset="1" stop-color="#f5a524"/>
    </linearGradient>
    <linearGradient id="hPhone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e2d3d"/>
      <stop offset="1" stop-color="#0a1520"/>
    </linearGradient>
    <radialGradient id="hGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#f5a524" stop-opacity=".55"/>
      <stop offset="1" stop-color="#f5a524" stop-opacity="0"/>
    </radialGradient>
    <filter id="hShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope=".4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#hBg)"/>
  <circle cx="900" cy="180" r="300" fill="url(#hGlow)"/>
  <circle cx="200" cy="560" r="220" fill="url(#hGlow)" opacity=".6"/>

  <!-- Hotel building (left) -->
  <g transform="translate(110 120)" filter="url(#hShadow)">
    <!-- Main tower -->
    <rect x="40" y="60" width="240" height="420" rx="12" fill="url(#hBuilding)"/>
    <!-- Roof sign -->
    <rect x="80" y="20" width="160" height="44" rx="8" fill="#0a1d2e"/>
    <text x="160" y="50" text-anchor="middle" fill="#f5a524" font-family="system-ui,sans-serif" font-size="22" font-weight="800" letter-spacing="3">HOTEL</text>
    <!-- Windows grid -->
    <g fill="#0a1d2e">
      <rect x="70" y="110" width="40" height="40" rx="4"/><rect x="130" y="110" width="40" height="40" rx="4"/><rect x="190" y="110" width="40" height="40" rx="4" fill="#f5a524"/>
      <rect x="70" y="170" width="40" height="40" rx="4" fill="#f5a524"/><rect x="130" y="170" width="40" height="40" rx="4"/><rect x="190" y="170" width="40" height="40" rx="4"/>
      <rect x="70" y="230" width="40" height="40" rx="4"/><rect x="130" y="230" width="40" height="40" rx="4" fill="#f5a524"/><rect x="190" y="230" width="40" height="40" rx="4"/>
      <rect x="70" y="290" width="40" height="40" rx="4" fill="#f5a524"/><rect x="130" y="290" width="40" height="40" rx="4"/><rect x="190" y="290" width="40" height="40" rx="4" fill="#f5a524"/>
      <rect x="70" y="350" width="40" height="40" rx="4"/><rect x="130" y="350" width="40" height="40" rx="4"/><rect x="190" y="350" width="40" height="40" rx="4"/>
    </g>
    <!-- Entrance -->
    <rect x="130" y="410" width="60" height="70" rx="30" fill="#0a1d2e"/>
    <!-- Side wing -->
    <rect x="290" y="200" width="110" height="280" rx="10" fill="#fff7e6" opacity=".9"/>
    <g fill="#0a1d2e">
      <rect x="310" y="220" width="30" height="30" rx="3"/><rect x="350" y="220" width="30" height="30" rx="3" fill="#f5a524"/>
      <rect x="310" y="260" width="30" height="30" rx="3" fill="#f5a524"/><rect x="350" y="260" width="30" height="30" rx="3"/>
      <rect x="310" y="300" width="30" height="30" rx="3"/><rect x="350" y="300" width="30" height="30" rx="3"/>
      <rect x="310" y="340" width="30" height="30" rx="3" fill="#f5a524"/><rect x="350" y="340" width="30" height="30" rx="3"/>
    </g>
  </g>

  <!-- Phone with BLE key (right) -->
  <g transform="translate(720 130)" filter="url(#hShadow)">
    <rect width="280" height="440" rx="36" fill="url(#hPhone)"/>
    <rect x="16" y="16" width="248" height="408" rx="24" fill="#0e1a26"/>
    <!-- Notch -->
    <rect x="110" y="22" width="60" height="8" rx="4" fill="#000"/>

    <!-- Screen content: BLE key card -->
    <g transform="translate(40 70)">
      <rect width="200" height="120" rx="14" fill="#f5a524"/>
      <text x="16" y="34" fill="#0a1d2e" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">ROOM</text>
      <text x="16" y="86" fill="#0a1d2e" font-family="system-ui,sans-serif" font-size="48" font-weight="800">304</text>
      <text x="16" y="108" fill="#0a1d2e" font-family="system-ui,sans-serif" font-size="10" font-weight="600" opacity=".7">CHECKED IN · 2 NIGHTS</text>
    </g>

    <!-- BLE unlock button -->
    <g transform="translate(80 220)">
      <circle cx="60" cy="60" r="60" fill="#f5a524"/>
      <circle cx="60" cy="60" r="60" fill="none" stroke="#f5a524" stroke-width="3" opacity=".4">
        <animate attributeName="r" values="60;85;60" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".4;0;.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <!-- BLE icon -->
      <g transform="translate(60 60)" stroke="#0a1d2e" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none">
        <path d="M0 -22 L0 22 L14 10 L-14 -10 L14 10 L0 22 M0 -22 L14 -10 L-14 10"/>
      </g>
    </g>

    <!-- Action rows -->
    <g transform="translate(40 360)">
      <rect width="200" height="14" rx="7" fill="#1e2d3d"/>
      <rect y="24" width="140" height="10" rx="5" fill="#1e2d3d"/>
    </g>
  </g>

  <!-- BLE waves from phone to building -->
  <g stroke="#f5a524" stroke-width="3" fill="none" opacity=".75">
    <path d="M680 340 Q620 300 560 340" stroke-linecap="round"/>
    <path d="M680 360 Q610 300 540 360" stroke-linecap="round" opacity=".6"/>
    <path d="M680 380 Q600 300 520 380" stroke-linecap="round" opacity=".4"/>
  </g>

  <!-- POS chip icon (bottom right) -->
  <g transform="translate(1020 500)" filter="url(#hShadow)">
    <rect width="120" height="80" rx="10" fill="#fff7e6"/>
    <rect x="12" y="14" width="30" height="22" rx="3" fill="#f5a524"/>
    <g stroke="#0a1d2e" stroke-width="2" fill="none">
      <line x1="12" y1="48" x2="108" y2="48"/>
      <line x1="12" y1="58" x2="80" y2="58"/>
      <line x1="12" y1="68" x2="60" y2="68"/>
    </g>
    <text x="60" y="10" text-anchor="middle" fill="#f5a524" font-family="system-ui,sans-serif" font-size="8" font-weight="700" opacity="0"></text>
  </g>

  <!-- Backend badge (top-right) -->
  <g transform="translate(920 40)" filter="url(#hShadow)">
    <rect width="220" height="72" rx="14" fill="#0a1d2e" stroke="#f5a524" stroke-width="1.5"/>
    <text x="16" y="24" fill="#f5a524" font-family="system-ui,sans-serif" font-size="10" font-weight="700" letter-spacing="2">BACKEND</text>
    <g transform="translate(16 34)" font-family="system-ui,sans-serif" font-size="11" font-weight="700">
      <rect width="56" height="22" rx="11" fill="#10b981"/>
      <text x="28" y="15" text-anchor="middle" fill="#fff">Node.js</text>
      <rect x="62" width="56" height="22" rx="11" fill="#f5a524"/>
      <text x="90" y="15" text-anchor="middle" fill="#0a1d2e">Lambda</text>
      <rect x="124" width="60" height="22" rx="11" fill="#124a6b"/>
      <text x="154" y="15" text-anchor="middle" fill="#fff">MongoDB</text>
    </g>
  </g>

  <!-- Title lockup -->
  <g transform="translate(80 40)">
    <text fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="44" font-weight="800" letter-spacing="-1">Go Hotel Life</text>
    <text y="28" fill="#f5a524" font-family="system-ui,sans-serif" font-size="15" font-weight="500">Node.js · AWS Lambda · MongoDB · BLE · POS</text>
  </g>
</svg>
