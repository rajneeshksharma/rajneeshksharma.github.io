<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="mw">
  <title id="mw">MyWorth.ai — AI-powered wealth management dashboard</title>
  <defs>
    <linearGradient id="mwBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#041f1a"/>
      <stop offset=".55" stop-color="#0b4a3a"/>
      <stop offset="1" stop-color="#10b981"/>
    </linearGradient>
    <linearGradient id="mwPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="1" stop-color="#e8faf3" stop-opacity=".95"/>
    </linearGradient>
    <linearGradient id="mwLine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#10b981"/>
      <stop offset="1" stop-color="#34d399"/>
    </linearGradient>
    <linearGradient id="mwArea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#10b981" stop-opacity=".5"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </linearGradient>
    <radialGradient id="mwGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#10b981" stop-opacity=".55"/>
      <stop offset="1" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <filter id="mwShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope=".4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#mwBg)"/>
  <circle cx="950" cy="140" r="300" fill="url(#mwGlow)"/>
  <circle cx="180" cy="560" r="220" fill="url(#mwGlow)" opacity=".7"/>

  <!-- Dashboard panel -->
  <g transform="translate(120 170)" filter="url(#mwShadow)">
    <rect width="720" height="420" rx="20" fill="url(#mwPanel)"/>
    <!-- Header row -->
    <text x="32" y="50" fill="#041f1a" font-family="system-ui,sans-serif" font-size="14" font-weight="700" letter-spacing="2">TOTAL NET WORTH</text>
    <text x="32" y="102" fill="#041f1a" font-family="system-ui,sans-serif" font-size="48" font-weight="800">$2,847,310</text>
    <g transform="translate(32 120)">
      <rect width="96" height="26" rx="13" fill="#d1fae5"/>
      <text x="48" y="18" text-anchor="middle" fill="#065f46" font-family="system-ui,sans-serif" font-size="12" font-weight="700">+12.4% YTD</text>
    </g>
    <!-- AI badge top right -->
    <g transform="translate(600 26)">
      <rect width="96" height="32" rx="16" fill="#041f1a"/>
      <circle cx="20" cy="16" r="5" fill="#10b981">
        <animate attributeName="opacity" values="1;.3;1" dur="1.5s" repeatCount="indefinite"/>
      </circle>
      <text x="58" y="21" text-anchor="middle" fill="#10b981" font-family="system-ui,sans-serif" font-size="12" font-weight="700">AI · LIVE</text>
    </g>

    <!-- Chart area -->
    <g transform="translate(32 180)">
      <path d="M0 180 L80 140 L160 155 L240 90 L320 110 L400 60 L480 40 L560 20 L640 30 L640 200 L0 200 Z" fill="url(#mwArea)"/>
      <path d="M0 180 L80 140 L160 155 L240 90 L320 110 L400 60 L480 40 L560 20 L640 30" fill="none" stroke="url(#mwLine)" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
      <g fill="#10b981">
        <circle cx="0" cy="180" r="4"/><circle cx="80" cy="140" r="4"/><circle cx="160" cy="155" r="4"/>
        <circle cx="240" cy="90" r="4"/><circle cx="320" cy="110" r="4"/><circle cx="400" cy="60" r="4"/>
        <circle cx="480" cy="40" r="4"/><circle cx="560" cy="20" r="4"/><circle cx="640" cy="30" r="5"/>
      </g>
      <!-- Axis -->
      <line x1="0" y1="200" x2="640" y2="200" stroke="#041f1a" stroke-opacity=".15"/>
      <g fill="#041f1a" opacity=".5" font-family="system-ui,sans-serif" font-size="10" font-weight="600">
        <text x="0" y="220">JAN</text><text x="160" y="220">APR</text>
        <text x="320" y="220">JUL</text><text x="480" y="220">OCT</text>
      </g>
    </g>
  </g>

  <!-- Pie card (right) -->
  <g transform="translate(880 200)" filter="url(#mwShadow)">
    <rect width="220" height="260" rx="18" fill="url(#mwPanel)"/>
    <text x="20" y="34" fill="#041f1a" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">ALLOCATION</text>
    <g transform="translate(110 130)">
      <circle r="70" fill="#e8faf3"/>
      <!-- pie slices -->
      <path d="M0 0 L0 -70 A70 70 0 0 1 66 22 Z" fill="#10b981"/>
      <path d="M0 0 L66 22 A70 70 0 0 1 -22 66 Z" fill="#34d399"/>
      <path d="M0 0 L-22 66 A70 70 0 0 1 -66 -22 Z" fill="#065f46"/>
      <path d="M0 0 L-66 -22 A70 70 0 0 1 0 -70 Z" fill="#f59e0b"/>
      <circle r="34" fill="#fff"/>
      <text text-anchor="middle" y="-2" fill="#041f1a" font-family="system-ui,sans-serif" font-size="11" font-weight="700">500+</text>
      <text text-anchor="middle" y="12" fill="#041f1a" opacity=".7" font-family="system-ui,sans-serif" font-size="8">ASSETS</text>
    </g>
    <g font-family="system-ui,sans-serif" font-size="10" font-weight="600" fill="#041f1a">
      <circle cx="20" cy="225" r="4" fill="#10b981"/><text x="32" y="229">Equity</text>
      <circle cx="110" cy="225" r="4" fill="#34d399"/><text x="122" y="229">Bonds</text>
      <circle cx="20" cy="245" r="4" fill="#065f46"/><text x="32" y="249">Real Estate</text>
      <circle cx="110" cy="245" r="4" fill="#f59e0b"/><text x="122" y="249">Cash</text>
    </g>
  </g>

  <!-- Title lockup -->
  <g transform="translate(80 60)">
    <text fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="44" font-weight="800" letter-spacing="-1">MyWorth.ai</text>
    <text y="28" fill="#34d399" font-family="system-ui,sans-serif" font-size="15" font-weight="500">AI wealth management · Asset tracking · Family sharing</text>
  </g>
</svg>
