<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="ut">
  <title id="ut">United Transportation — unified logistics TMS from order to billing</title>
  <defs>
    <linearGradient id="utBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1026"/>
      <stop offset=".55" stop-color="#1e40af"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="utPanel" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity=".98"/>
      <stop offset="1" stop-color="#eff6ff" stop-opacity=".95"/>
    </linearGradient>
    <radialGradient id="utGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity=".55"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="utShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope=".4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#utBg)"/>
  <circle cx="950" cy="140" r="300" fill="url(#utGlow)"/>
  <circle cx="180" cy="560" r="220" fill="url(#utGlow)" opacity=".7"/>

  <!-- Dashboard panel (left) -->
  <g transform="translate(100 150)" filter="url(#utShadow)">
    <rect width="580" height="420" rx="18" fill="url(#utPanel)"/>
    <text x="28" y="44" fill="#0a1026" font-family="system-ui,sans-serif" font-size="12" font-weight="700" letter-spacing="2">OPERATIONS DASHBOARD</text>

    <!-- KPI tiles -->
    <g transform="translate(28 64)">
      <g>
        <rect width="170" height="80" rx="10" fill="#dbeafe"/>
        <text x="14" y="24" fill="#1e40af" font-family="system-ui,sans-serif" font-size="10" font-weight="700">ACTIVE ORDERS</text>
        <text x="14" y="58" fill="#0a1026" font-family="system-ui,sans-serif" font-size="28" font-weight="800">248</text>
      </g>
      <g transform="translate(184 0)">
        <rect width="170" height="80" rx="10" fill="#dbeafe"/>
        <text x="14" y="24" fill="#1e40af" font-family="system-ui,sans-serif" font-size="10" font-weight="700">DISPATCHED</text>
        <text x="14" y="58" fill="#0a1026" font-family="system-ui,sans-serif" font-size="28" font-weight="800">182</text>
      </g>
      <g transform="translate(368 0)">
        <rect width="170" height="80" rx="10" fill="#0a1026"/>
        <text x="14" y="24" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="10" font-weight="700">BILLED Q1</text>
        <text x="14" y="58" fill="#fff" font-family="system-ui,sans-serif" font-size="24" font-weight="800">$1.2M</text>
      </g>
    </g>

    <!-- Pipeline -->
    <g transform="translate(28 170)" font-family="system-ui,sans-serif" font-size="11" font-weight="700">
      <text fill="#64748b" letter-spacing="2">ORDER → DISPATCH → BILLING</text>
      <g transform="translate(0 16)">
        <rect width="120" height="40" rx="8" fill="#3b82f6"/>
        <text x="60" y="25" text-anchor="middle" fill="#fff">ORDER</text>
      </g>
      <g transform="translate(132 16)">
        <path d="M0 20 L18 20" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 14 L20 20 L12 26" stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(160 16)">
        <rect width="120" height="40" rx="8" fill="#3b82f6"/>
        <text x="60" y="25" text-anchor="middle" fill="#fff">DISPATCH</text>
      </g>
      <g transform="translate(292 16)">
        <path d="M0 20 L18 20" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 14 L20 20 L12 26" stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(320 16)">
        <rect width="120" height="40" rx="8" fill="#1e40af"/>
        <text x="60" y="25" text-anchor="middle" fill="#fff">INVOICE</text>
      </g>
      <g transform="translate(452 16)">
        <path d="M0 20 L18 20" stroke="#64748b" stroke-width="2" stroke-linecap="round"/>
        <path d="M12 14 L20 20 L12 26" stroke="#64748b" stroke-width="2" fill="none" stroke-linecap="round"/>
      </g>
      <g transform="translate(480 16)">
        <rect width="60" height="40" rx="8" fill="#10b981"/>
        <text x="30" y="25" text-anchor="middle" fill="#fff">PAID</text>
      </g>
    </g>

    <!-- Integrations -->
    <g transform="translate(28 260)">
      <text fill="#64748b" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">INTEGRATED SYSTEMS</text>
      <g transform="translate(0 16)" font-family="system-ui,sans-serif" font-size="11" font-weight="700">
        <g>
          <rect width="124" height="36" rx="8" fill="#f59e0b"/>
          <text x="62" y="23" text-anchor="middle" fill="#fff">HubSpot</text>
        </g>
        <g transform="translate(136 0)">
          <rect width="124" height="36" rx="8" fill="#10b981"/>
          <text x="62" y="23" text-anchor="middle" fill="#fff">QuickBooks</text>
        </g>
        <g transform="translate(272 0)">
          <rect width="124" height="36" rx="8" fill="#1e40af"/>
          <text x="62" y="23" text-anchor="middle" fill="#fff">AWS Lambda</text>
        </g>
        <g transform="translate(408 0)">
          <rect width="124" height="36" rx="8" fill="#0a1026"/>
          <text x="62" y="23" text-anchor="middle" fill="#fff">DynamoDB</text>
        </g>
      </g>
    </g>

    <!-- Progress bar -->
    <g transform="translate(28 340)">
      <text fill="#64748b" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="2">4+ MONTHS BACKLOG CLEARED</text>
      <rect y="16" width="524" height="14" rx="7" fill="#e2e8f0"/>
      <rect y="16" width="524" height="14" rx="7" fill="#10b981"/>
      <text x="524" y="50" text-anchor="end" fill="#10b981" font-family="system-ui,sans-serif" font-size="12" font-weight="800">100%</text>
    </g>
  </g>

  <!-- Truck (right) -->
  <g transform="translate(760 280)" filter="url(#utShadow)">
    <!-- body -->
    <rect x="80" y="0" width="220" height="120" rx="8" fill="#fff"/>
    <!-- cab -->
    <path d="M0 30 L80 30 L80 120 L0 120 Q-8 120 -8 112 L-8 50 Q-8 30 0 30 Z" fill="#3b82f6"/>
    <rect x="6" y="46" width="50" height="36" rx="4" fill="#93c5fd"/>
    <!-- wheels -->
    <circle cx="30" cy="130" r="18" fill="#0a1026"/>
    <circle cx="30" cy="130" r="8" fill="#64748b"/>
    <circle cx="130" cy="130" r="18" fill="#0a1026"/>
    <circle cx="130" cy="130" r="8" fill="#64748b"/>
    <circle cx="260" cy="130" r="18" fill="#0a1026"/>
    <circle cx="260" cy="130" r="8" fill="#64748b"/>
    <!-- logo on trailer -->
    <text x="190" y="74" text-anchor="middle" fill="#1e40af" font-family="system-ui,sans-serif" font-size="20" font-weight="800">UNITED</text>
    <text x="190" y="92" text-anchor="middle" fill="#3b82f6" font-family="system-ui,sans-serif" font-size="10" font-weight="600" letter-spacing="2">TRANSPORT</text>
  </g>

  <!-- Speed lines -->
  <g stroke="#60a5fa" stroke-width="3" stroke-linecap="round" opacity=".6">
    <line x1="720" y1="330" x2="760" y2="330"/>
    <line x1="700" y1="360" x2="750" y2="360"/>
    <line x1="720" y1="390" x2="760" y2="390"/>
  </g>

  <!-- Title lockup -->
  <g transform="translate(80 60)">
    <text fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" letter-spacing="-1">United Transportation</text>
    <text y="28" fill="#93c5fd" font-family="system-ui,sans-serif" font-size="15" font-weight="500">Unified TMS · Order → Dispatch → Billing</text>
  </g>
</svg>
