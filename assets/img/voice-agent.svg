<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 675" role="img" aria-labelledby="va">
  <title id="va">AI Voice Agent Platform — white-label outbound AI calling</title>
  <defs>
    <linearGradient id="vaBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a1026"/>
      <stop offset=".55" stop-color="#1e3a8a"/>
      <stop offset="1" stop-color="#3b82f6"/>
    </linearGradient>
    <linearGradient id="vaPhone" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1e293b"/>
      <stop offset="1" stop-color="#0a1026"/>
    </linearGradient>
    <linearGradient id="vaWave" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </linearGradient>
    <radialGradient id="vaGlow" cx=".5" cy=".5" r=".5">
      <stop offset="0" stop-color="#3b82f6" stop-opacity=".6"/>
      <stop offset="1" stop-color="#3b82f6" stop-opacity="0"/>
    </radialGradient>
    <filter id="vaShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="12"/>
      <feOffset dy="10"/>
      <feComponentTransfer><feFuncA type="linear" slope=".4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="675" fill="url(#vaBg)"/>
  <circle cx="950" cy="180" r="300" fill="url(#vaGlow)"/>
  <circle cx="220" cy="560" r="220" fill="url(#vaGlow)" opacity=".7"/>

  <!-- Phone (left) -->
  <g transform="translate(140 140)" filter="url(#vaShadow)">
    <rect width="260" height="420" rx="36" fill="url(#vaPhone)"/>
    <rect x="14" y="14" width="232" height="392" rx="24" fill="#0f172a"/>
    <!-- Status -->
    <g transform="translate(130 50)">
      <circle r="6" fill="#10b981">
        <animate attributeName="opacity" values="1;.3;1" dur="1.2s" repeatCount="indefinite"/>
      </circle>
      <text x="14" y="4" fill="#10b981" font-family="system-ui,sans-serif" font-size="11" font-weight="700" letter-spacing="1">IN CALL · 02:34</text>
    </g>
    <!-- AI avatar -->
    <g transform="translate(130 160)">
      <circle r="58" fill="#3b82f6" opacity=".2"/>
      <circle r="58" fill="none" stroke="#3b82f6" stroke-width="2" opacity=".4">
        <animate attributeName="r" values="58;78;58" dur="2s" repeatCount="indefinite"/>
        <animate attributeName="opacity" values=".4;0;.4" dur="2s" repeatCount="indefinite"/>
      </circle>
      <circle r="44" fill="#3b82f6"/>
      <text text-anchor="middle" y="6" fill="#fff" font-family="system-ui,sans-serif" font-size="22" font-weight="800">AI</text>
    </g>
    <text x="130" y="250" text-anchor="middle" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="14" font-weight="600">Priya · Hindi + EN</text>
    <!-- Transcript -->
    <g transform="translate(28 280)">
      <rect width="204" height="40" rx="8" fill="#1e293b"/>
      <text x="12" y="16" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="9" font-weight="700">AGENT</text>
      <text x="12" y="32" fill="#e2e8f0" font-family="system-ui,sans-serif" font-size="10">"Kya aap free hain kal..."</text>
    </g>
    <!-- Call buttons -->
    <g transform="translate(42 350)">
      <circle cx="30" cy="30" r="26" fill="#1e293b"/>
      <rect x="22" y="22" width="16" height="16" rx="3" fill="#94a3b8"/>
      <circle cx="90" cy="30" r="30" fill="#ef4444"/>
      <path d="M76 30 h28 M90 16 v28" stroke="#fff" stroke-width="3" stroke-linecap="round" transform="rotate(135 90 30)"/>
      <circle cx="150" cy="30" r="26" fill="#1e293b"/>
      <path d="M142 24 h16 v12 h-16 z" fill="none" stroke="#94a3b8" stroke-width="2"/>
    </g>
  </g>

  <!-- Sound waves -->
  <g transform="translate(440 350)" stroke="url(#vaWave)" stroke-linecap="round">
    <line x1="0" y1="-40" x2="0" y2="40" stroke-width="4"/>
    <line x1="20" y1="-60" x2="20" y2="60" stroke-width="4"/>
    <line x1="40" y1="-30" x2="40" y2="30" stroke-width="4"/>
    <line x1="60" y1="-70" x2="60" y2="70" stroke-width="4"/>
    <line x1="80" y1="-20" x2="80" y2="20" stroke-width="4"/>
    <line x1="100" y1="-50" x2="100" y2="50" stroke-width="4"/>
    <line x1="120" y1="-35" x2="120" y2="35" stroke-width="4"/>
    <line x1="140" y1="-65" x2="140" y2="65" stroke-width="4"/>
    <line x1="160" y1="-25" x2="160" y2="25" stroke-width="4"/>
    <line x1="180" y1="-45" x2="180" y2="45" stroke-width="4"/>
    <line x1="200" y1="-55" x2="200" y2="55" stroke-width="4"/>
  </g>

  <!-- Pipeline nodes (right) -->
  <g transform="translate(700 170)" filter="url(#vaShadow)">
    <rect width="380" height="360" rx="18" fill="#ffffff" fill-opacity=".95"/>
    <text x="24" y="36" fill="#0a1026" font-family="system-ui,sans-serif" font-size="12" font-weight="700" letter-spacing="2">PIPELINE</text>
    <g font-family="system-ui,sans-serif" font-size="13" font-weight="700" fill="#0a1026">
      <g transform="translate(24 60)">
        <rect width="332" height="48" rx="10" fill="#dbeafe"/>
        <circle cx="28" cy="24" r="12" fill="#3b82f6"/>
        <text x="56" y="29">Asterisk · SIP Trunk</text>
      </g>
      <g transform="translate(24 120)">
        <rect width="332" height="48" rx="10" fill="#dbeafe"/>
        <circle cx="28" cy="24" r="12" fill="#3b82f6"/>
        <text x="56" y="29">Deepgram STT</text>
      </g>
      <g transform="translate(24 180)">
        <rect width="332" height="48" rx="10" fill="#dbeafe"/>
        <circle cx="28" cy="24" r="12" fill="#3b82f6"/>
        <text x="56" y="29">Amazon Lex V2 · NLU</text>
      </g>
      <g transform="translate(24 240)">
        <rect width="332" height="48" rx="10" fill="#dbeafe"/>
        <circle cx="28" cy="24" r="12" fill="#3b82f6"/>
        <text x="56" y="29">AWS Polly · TTS</text>
      </g>
      <g transform="translate(24 300)">
        <rect width="332" height="40" rx="10" fill="#0a1026"/>
        <text x="166" y="25" text-anchor="middle" fill="#60a5fa">~150 calls/day · &lt;₹10K/mo</text>
      </g>
    </g>
  </g>

  <!-- Title lockup -->
  <g transform="translate(80 50)">
    <text fill="#fff" font-family="system-ui,-apple-system,sans-serif" font-size="40" font-weight="800" letter-spacing="-1">AI Voice Agent</text>
    <text y="28" fill="#60a5fa" font-family="system-ui,sans-serif" font-size="15" font-weight="500">White-label outbound calling · Hindi + English</text>
  </g>
</svg>
